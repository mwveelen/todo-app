<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Lijst</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a6741">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="container">
        <header>
            <h1>To Do Lijst</h1>
        </header>

        <div class="grid-row top-row">
            <div class="column" data-category="Dinsdag">
                <h2>Dinsdag</h2>
                <ul class="task-list"></ul>
                <div class="add-task">
                    <input type="text" placeholder="Nieuwe taak...">
                    <button class="add-btn">+</button>
                </div>
            </div>
            <div class="column" data-category="Woensdag">
                <h2>Woensdag</h2>
                <ul class="task-list"></ul>
                <div class="add-task">
                    <input type="text" placeholder="Nieuwe taak...">
                    <button class="add-btn">+</button>
                </div>
            </div>
            <div class="column" data-category="Donderdag">
                <h2>Donderdag</h2>
                <ul class="task-list"></ul>
                <div class="add-task">
                    <input type="text" placeholder="Nieuwe taak...">
                    <button class="add-btn">+</button>
                </div>
            </div>
        </div>

        <div class="grid-row bottom-row">
            <div class="column" data-category="IB">
                <h2>IB</h2>
                <ul class="task-list"></ul>
                <div class="add-task">
                    <input type="text" placeholder="Nieuwe taak...">
                    <button class="add-btn">+</button>
                </div>
            </div>
            <div class="column" data-category="MT">
                <h2>MT</h2>
                <ul class="task-list"></ul>
                <div class="add-task">
                    <input type="text" placeholder="Nieuwe taak...">
                    <button class="add-btn">+</button>
                </div>
            </div>
            <div class="column" data-category="LIB">
                <h2>LIB</h2>
                <ul class="task-list"></ul>
                <div class="add-task">
                    <input type="text" placeholder="Nieuwe taak...">
                    <button class="add-btn">+</button>
                </div>
            </div>
            <div class="column" data-category="Overig">
                <h2>Overig</h2>
                <ul class="task-list"></ul>
                <div class="add-task">
                    <input type="text" placeholder="Nieuwe taak...">
                    <button class="add-btn">+</button>
                </div>
            </div>
        </div>

        <footer>
            <div class="sync-controls">
                <button id="export-btn" title="Exporteer taken naar klembord">Exporteer 📋</button>
                <button id="import-btn" title="Importeer taken uit klembord">Importeer 📥</button>
            </div>
        </footer>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
