<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Lijst</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>To Do Lijst</h1>

                <h2>Dinsdag</h2>

                    <input type="text" placeholder="Nieuwe taak...">
                    <button class="add-btn">+</button>
                </div>
            </div>

                    <input type="text" placeholder="Nieuwe taak...">
                    <button class="add-btn">+</button>
                </div>
            </div>
        </div>

        <div class="grid-row bottom-row">
            <div class="column" data-category="IB">
                <h2>IB</h2>
                <ul class="task-list"></ul>
                <div class="add-task">

            </div>
            <div class="column" data-category="MT">

                    <input type="text" placeholder="Nieuwe taak...">

            </div>
            <div class="column" data-category="Overig">
                <h2>Overig</h2>
                <ul class="task-list"></ul>
                <div class="add-task">
                    <input type="text" placeholder="Nieuwe taak...">
                    <button class="add-btn">+</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
